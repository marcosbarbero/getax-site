      <svg width="24" height="24" viewBox="0 0 64 64" aria-hidden="true">
        <path d="M8 46 A 26 26 0 0 1 56 46" fill="none" stroke="#7C8794" stroke-width="4"/>
        <path d="M32 48 L23 29 Q32 20 41 29 Z" fill="#D9541F"/>
      </svg>
      <span class="lockup__w">get<i>ax</i></span>
      <span class="toplabel">· docs{% if page.title %} / {{ page.title | downcase }}{% endif %}</span>

    <button class="themebtn" id="themebtn" aria-label="Toggle light and dark theme">◐ theme</button>
  </header>
  <nav class="side" id="toc" aria-label="On this page"></nav>
  <main id="content">
    {{ content }}
  </main>
</div>
